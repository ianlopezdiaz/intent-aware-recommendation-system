name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check .

  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + notebook dependencies
        run: pip install -e ".[notebook]"

      - name: Register Jupyter kernel
        run: python -m ipykernel install --user --name python3

      # Executed copies are discarded (no --inplace) — this only checks
      # that every notebook still runs top to bottom without raising.
      - name: Execute notebooks
        run: |
          mkdir -p /tmp/executed-notebooks
          jupyter nbconvert --to notebook --execute notebooks/*.ipynb --output-dir /tmp/executed-notebooks
